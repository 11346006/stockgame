{% load static %}


<html>

<head>
    <title>庫存管理模擬器</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>

<body>
    <!-- <audio id="bgm" loop autoplay volume="0.1">
        <source src="{% static 'music/bgm.mp3' %}" type="audio/mpeg">
    </audio> -->
    <header>
        <nav>
            <h1 class="title"><a href="{% url 'home' %}">庫存管理模擬器</a></h1>
            <ul class="nav_ul">
                <li>
                    <a href="{% url 'achievements' %}" class="nav_ul_a">
                        🏆 成就圖鑑
                    </a>
                </li>
                <li><a href="{% url 'leaderboard' %}" class="nav_ul_a">排行榜</a></li>
                <!-- <li><a href="#" class="nav_ul_a" onclick="showPopup()"> 事件公告</a></li> -->
                <li>
                    <h3>{{ request.user.username }}</h3>
                </li>
                <li><a href="{% url 'logout' %}" class="nav_ul_a">登出</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {% block content %}
        {% endblock content %}

        {{ messages_json|json_script:"msg-data" }}
        <script>
            function showToast(msg, type) {
                const div = document.createElement("div");
                div.className = "toast " + type;
                div.innerText = msg;
                document.getElementById("toast-container").appendChild(div);
                setTimeout(() => div.remove(), 3000);
            }
        </script>
        <script>
            const msgElement = document.getElementById("msg-data");

            if (msgElement) {
                const data = JSON.parse(msgElement.textContent);

                data.forEach(m => {
                    showToast(m.message, m.tags);
                });
            }
        </script>

    </main>

    <script>
        let timerStarted = false;

        function startTimer() {
            if (timerStarted) return;
            timerStarted = true;

            const timerEl = document.getElementById("timer");
            if (!timerEl) return;

            let time = Number(timerEl.innerText.trim());

            console.log("timer start:", time);

            if (isNaN(time)) {
                console.error("timer 不是數字:", timerEl.innerText);
                return;
            }

            setInterval(() => {
                time--;

                if (time <= 0) {
                    location.reload();
                    return;
                }

                timerEl.innerText = time;
            }, 1000);
        }
        const tutorialSteps = [
            "1/6 🎮 歡迎來到《庫存管理模擬器》！\n 你將經營一間倉庫公司。",

            "2/6 📦 在【備貨階段】，你可以進貨商品，\n建立你的庫存。",

            "3/6 🚚 在【接單階段】，客戶會下訂單，\n記得準時出貨！",

            "4/6 💰 每次成功出貨都能獲得金幣與經驗值，\n用來升級公司。",

            "5/6 ⭐ 升級後會解鎖更多商品與更大倉庫容量，\n挑戰更高收益！",

            "6/6 🎉 好好經營你的物流帝國吧，\n祝你成為最強倉庫大亨！"
        ];

        let index = 0;

        function renderTutorial() {
            const box = document.getElementById("tutorial");
            const text = document.getElementById("tutorialText");

            console.log("BOX:", box);
            console.log("TEXT:", text);

            if (!box || !text) {
                console.log("MISSING DOM");
                return;
            }

            box.style.display = "flex";
            text.innerText = tutorialSteps[index];
        }

        function nextTutorial() {
            index++;

            if (index >= tutorialSteps.length) {

                fetch("{% url 'finish_tutorial' %}", {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": "{{ csrf_token }}"
                    }
                }).then(() => {
                    document.getElementById("tutorial").style.display = "none";
                    startTimer(); // ✅ 只在「最後一步」才啟動
                });

                return;
            }

            renderTutorial();
        }

        function startTutorial() {
            console.log("START TUTORIAL FIRED");
            index = 0;
            renderTutorial();
        }
        document.addEventListener("DOMContentLoaded", () => {

            const isTutorial = "{{ is_tutorial|yesno:'true,false' }}" === "true";

            if (isTutorial) {
                startTutorial();
            } else {
                startTimer();
            }

        });
    </script>
</body>

</html>
